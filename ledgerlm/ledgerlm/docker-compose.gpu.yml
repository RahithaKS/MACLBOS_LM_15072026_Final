# ================================
# LedgerLM GPU Docker Compose
# ================================
# For Bosch VM with NVIDIA Tesla T4 GPU
# CUDA 12.2 Support
#
# Usage (on Bosch VM):
#   1. Login to ACR: docker login boschledgerlm.azurecr.io
#   2. Copy .env.gpu.example to .env and fill in values
#   3. Run: docker compose pull && docker compose up -d
#
# Containers:
#   1. ledgerlm-db  - PostgreSQL database
#   2. ledgerlm-app - Application (Node.js + Python + Nginx)

services:
  # ================================
  # PostgreSQL Database
  # ================================
  db:
    image: pgvector/pgvector:pg16
    container_name: ledgerlm-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ledgerlm_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ledgerlm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ledgerlm_app} -d ${POSTGRES_DB:-ledgerlm}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ================================
  # LedgerLM Application with GPU Support
  # ================================
  app:
    image: boschledgerlm.azurecr.io/ledgerlm-app:v1.0.30-gpu
    container_name: ledgerlm-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      # ================================
      # DATABASE CONNECTION (connects to db container)
      # ================================
      DATABASE_URL: postgresql://${POSTGRES_USER:-ledgerlm_app}:${POSTGRES_PASSWORD}@ledgerlm-db:5432/${POSTGRES_DB:-ledgerlm}
      
      # ================================
      # Application Settings
      # ================================
      NODE_ENV: production
      PORT: 5000
      PYTHON_BACKEND_URL: http://127.0.0.1:8000
      
      # ================================
      # OpenAI API
      # ================================
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      
      # ================================
      # Email (SMTP)
      # ================================
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-${SMTP_PASS:-}}
      SMTP_FROM: ${SMTP_FROM:-noreply@ledgerlm.com}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      
      # ================================
      # Anaplan Integration (Optional)
      # ================================
      ANAPLAN_WORKSPACE_ID: ${ANAPLAN_WORKSPACE_ID:-}
      ANAPLAN_MODEL_ID: ${ANAPLAN_MODEL_ID:-}
      ANAPLAN_EXPORT_PROCESS_ID: ${ANAPLAN_EXPORT_PROCESS_ID:-}
      ANAPLAN_USERNAME: ${ANAPLAN_USERNAME:-}
      ANAPLAN_PASSWORD: ${ANAPLAN_PASSWORD:-}
      ANAPLAN_COMPANY_ID: ${ANAPLAN_COMPANY_ID:-}
      
      # ================================
      # Google Search (Optional)
      # ================================
      GOOGLE_SEARCH_API_KEY: ${GOOGLE_SEARCH_API_KEY:-}
      GOOGLE_SEARCH_ENGINE_ID: ${GOOGLE_SEARCH_ENGINE_ID:-}
      
      # ================================
      # Session Security
      # ================================
      SESSION_SECRET: ${SESSION_SECRET}
      
      # ================================
      # Admin OTP
      # ================================
      NEMKO_ADMIN_OTP: ${NEMKO_ADMIN_OTP:-}
      
      # ================================
      # GPU Configuration
      # ================================
      NVIDIA_VISIBLE_DEVICES: all
      CUDA_VISIBLE_DEVICES: "0"
    
    # ================================
    # GPU Access Configuration (NVIDIA Runtime)
    # ================================
    runtime: nvidia
    
    volumes:
      - app_uploads:/app/uploads
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

# ================================
# Named Volumes (Persistent Data)
# ================================
volumes:
  postgres_data:
    driver: local
  app_uploads:
    driver: local
