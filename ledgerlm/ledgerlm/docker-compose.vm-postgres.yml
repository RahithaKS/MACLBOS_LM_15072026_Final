# ================================
# LedgerLM Docker Compose - VM PostgreSQL Version
# ================================
# Use this when PostgreSQL is ALREADY installed on the Bosch VM
# (not running in Docker)
#
# Usage:
#   1. Copy .env.vm-postgres.example to .env
#   2. Fill in your PostgreSQL connection details
#   3. Run: docker-compose -f docker-compose.vm-postgres.yml up -d

version: '3.8'

services:
  # ================================
  # LedgerLM Application ONLY
  # (Connects to existing PostgreSQL on VM)
  # ================================
  app:
    image: ${DOCKER_IMAGE:-boschledgerlm.azurecr.io/ledgerlm:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ledgerlm-app
    restart: always
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      # ================================
      # DATABASE CONNECTION
      # ================================
      # Connect to PostgreSQL running on the HOST machine (VM)
      # Use 'host.docker.internal' on Docker Desktop
      # Use '172.17.0.1' on Linux (Docker's bridge gateway to host)
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-172.17.0.1}:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
      
      # ================================
      # Application Settings
      # ================================
      NODE_ENV: production
      PORT: 5000
      PYTHON_BACKEND_URL: http://127.0.0.1:8000
      
      # ================================
      # OpenAI API
      # ================================
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      
      # ================================
      # Email (SMTP)
      # ================================
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-noreply@ledgerlm.com}
      
      # ================================
      # Anaplan Integration
      # ================================
      ANAPLAN_WORKSPACE_ID: ${ANAPLAN_WORKSPACE_ID:-}
      ANAPLAN_MODEL_ID: ${ANAPLAN_MODEL_ID:-}
      ANAPLAN_PROCESS_ID: ${ANAPLAN_PROCESS_ID:-}
      ANAPLAN_USERNAME: ${ANAPLAN_USERNAME:-}
      ANAPLAN_PASSWORD: ${ANAPLAN_PASSWORD:-}
      
      # ================================
      # Google Search (Optional)
      # ================================
      GOOGLE_SEARCH_API_KEY: ${GOOGLE_SEARCH_API_KEY:-}
      GOOGLE_SEARCH_ENGINE_ID: ${GOOGLE_SEARCH_ENGINE_ID:-}
      
      # ================================
      # Session Security
      # ================================
      SESSION_SECRET: ${SESSION_SECRET}
      
      # ================================
      # Admin OTP
      # ================================
      NEMKO_ADMIN_OTP: ${NEMKO_ADMIN_OTP:-}
    
    volumes:
      - app_uploads:/app/uploads
    
    # No database dependency - PostgreSQL is external
    extra_hosts:
      - "host.docker.internal:host-gateway"
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

# ================================
# Named Volumes
# ================================
volumes:
  app_uploads:
    driver: local
