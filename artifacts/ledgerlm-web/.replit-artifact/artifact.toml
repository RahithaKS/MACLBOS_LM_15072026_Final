kind = "web"
previewPath = "/"
title = "LedgerLM"
version = "1.0.0"
id = "artifacts/ledgerlm-web"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20168

[services.development]
run = "cd /home/runner/workspace/ledgerlm/ledgerlm && npm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ledgerlm-web", "run", "build" ]
serve = "static"
publicDir = "artifacts/ledgerlm-web/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20168"
BASE_PATH = "/"
